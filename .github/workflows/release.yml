name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-linux:
    name: Build Linux amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsfml-dev libgl1-mesa-dev

      - name: Setup Premake Linux
        run: |
          curl -fsSL -o premake.tar.gz https://github.com/premake/premake-core/releases/download/v5.0.0-beta7/premake-5.0.0-beta7-linux.tar.gz
          tar -xzf premake.tar.gz
          sudo install -m 0755 premake5 /usr/local/bin/premake5

      - name: Build
        run: make build config=release jobs=2

      - name: Package
        run: |
          mkdir -p dist/slimes-linux-amd64
          cp -R build/bin/Release-linux-x86_64/slimes/. dist/slimes-linux-amd64/
          tar -czf dist/slimes-linux-amd64.tar.gz -C dist slimes-linux-amd64

      - uses: actions/upload-artifact@v7
        with:
          name: slimes-linux-amd64
          path: dist/slimes-linux-amd64.tar.gz

  build-windows:
    name: Build Windows amd64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup Premake Windows
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://github.com/premake/premake-core/releases/download/v5.0.0-beta7/premake-5.0.0-beta7-windows.zip -OutFile premake.zip
          Expand-Archive premake.zip -DestinationPath "$env:RUNNER_TEMP/premake" -Force
          "$env:RUNNER_TEMP/premake" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build
        shell: pwsh
        run: |
          premake5 vs2022
          MSBuild.exe build\saffron.sln /property:Configuration=Release /property:Platform=x64

      - name: Package
        shell: pwsh
        run: |
          $source = "build/bin/Release-windows-x86_64/slimes"
          if (!(Test-Path $source)) {
            $source = "build/bin/Release-windows-x64/slimes"
          }
          New-Item -ItemType Directory -Force -Path dist/slimes-windows-amd64 | Out-Null
          Copy-Item -Recurse "$source/*" dist/slimes-windows-amd64/
          Compress-Archive -Path dist/slimes-windows-amd64 -DestinationPath dist/slimes-windows-amd64.zip

      - uses: actions/upload-artifact@v7
        with:
          name: slimes-windows-amd64
          path: dist/slimes-windows-amd64.zip

  release:
    name: Create GitHub release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/*
          generate_release_notes: true
          overwrite_files: true
