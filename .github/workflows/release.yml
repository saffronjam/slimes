name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-linux:
    name: Build Linux amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsfml-dev libgl1-mesa-dev patchelf

      - name: Setup Premake Linux
        run: |
          curl -fsSL -o premake.tar.gz https://github.com/premake/premake-core/releases/download/v5.0.0-beta7/premake-5.0.0-beta7-linux.tar.gz
          tar -xzf premake.tar.gz
          sudo install -m 0755 premake5 /usr/local/bin/premake5

      - name: Build
        run: make build config=release jobs=2

      - name: Package AppImage
        run: |
          app_name="Slimes"
          app_id="slimes"
          appimage="dist/${app_name}-x86_64.AppImage"
          appdir="dist/${app_name}.AppDir"
          binary="$appdir/usr/bin/slimes"

          curl -fsSL -o appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

          mkdir -p "$appdir/usr/bin" "$appdir/usr/lib" "$appdir/usr/share/applications" "$appdir/usr/share/icons/hicolor/256x256/apps"
          cp -R build/bin/Release-linux-x86_64/slimes/. "$appdir/usr/bin/"

          ldd "$binary" | awk '/=> \/.*\// { print $3 }' | while read -r lib; do
            name="$(basename "$lib")"
            case "$name" in
              ld-linux-*|libc.so.*|libm.so.*|libpthread.so.*|libdl.so.*|librt.so.*|libresolv.so.*)
                continue
                ;;
            esac
            cp -L -n "$lib" "$appdir/usr/lib/"
          done

          patchelf --set-rpath '$ORIGIN/../lib' "$binary"
          find "$appdir/usr/lib" -type f -name '*.so*' -exec patchelf --set-rpath '$ORIGIN' {} \;

          cat > "$appdir/AppRun" <<'EOF'
          #!/bin/sh
          set -eu
          appdir="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="$appdir/usr/lib:${LD_LIBRARY_PATH:-}"
          cd "$appdir/usr/bin"
          exec "$appdir/usr/bin/slimes" "$@"
          EOF
          chmod +x "$appdir/AppRun"

          cat > "$appdir/${app_id}.desktop" <<EOF
          [Desktop Entry]
          Type=Application
          Name=${app_name}
          GenericName=${app_name}
          Comment=${app_name}
          Exec=AppRun
          Icon=${app_id}
          Categories=Game;
          Terminal=false
          StartupNotify=true
          StartupWMClass=${app_id}
          EOF
          cp "$appdir/${app_id}.desktop" "$appdir/usr/share/applications/${app_id}.desktop"

          cp docs/preview0.png "$appdir/${app_id}.png"
          cp docs/preview0.png "$appdir/.DirIcon"
          cp docs/preview0.png "$appdir/usr/share/icons/hicolor/256x256/apps/${app_id}.png"

          APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool "$appdir" "$appimage"

      - uses: actions/upload-artifact@v7
        with:
          name: Slimes-x86_64.AppImage
          path: dist/Slimes-x86_64.AppImage

  build-windows:
    name: Build Windows amd64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup Premake Windows
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://github.com/premake/premake-core/releases/download/v5.0.0-beta7/premake-5.0.0-beta7-windows.zip -OutFile premake.zip
          Expand-Archive premake.zip -DestinationPath "$env:RUNNER_TEMP/premake" -Force
          "$env:RUNNER_TEMP/premake" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build
        shell: pwsh
        run: |
          premake5 vs2022
          MSBuild.exe saffron.sln /property:Configuration=Release /property:Platform=x64

      - name: Package
        shell: pwsh
        run: |
          $source = "build/bin/Release-windows-x86_64/slimes"
          if (!(Test-Path $source)) {
            $source = "build/bin/Release-windows-x64/slimes"
          }
          New-Item -ItemType Directory -Force -Path dist/slimes-windows-amd64 | Out-Null
          Copy-Item -Recurse "$source/*" dist/slimes-windows-amd64/
          Compress-Archive -Path dist/slimes-windows-amd64 -DestinationPath dist/slimes-windows-amd64.zip

      - uses: actions/upload-artifact@v7
        with:
          name: slimes-windows-amd64
          path: dist/slimes-windows-amd64.zip

  release:
    name: Create GitHub release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/*
          generate_release_notes: true
          overwrite_files: true
