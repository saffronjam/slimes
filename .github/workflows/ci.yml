name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-linux:
    name: Build Linux amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsfml-dev libgl1-mesa-dev



      - name: Setup Premake Linux
        if: runner.os == 'Linux'
        run: |
          curl -fsSL -o premake.tar.gz https://github.com/premake/premake-core/releases/download/v5.0.0-beta7/premake-5.0.0-beta7-linux.tar.gz
          sudo tar -xzf premake.tar.gz -C /usr/local/bin premake5
          premake5 --version

      - name: Setup Premake Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://github.com/premake/premake-core/releases/download/v5.0.0-beta7/premake-5.0.0-beta7-windows.zip -OutFile premake.zip
          Expand-Archive premake.zip -DestinationPath "$env:RUNNER_TEMP/premake" -Force
          "$env:RUNNER_TEMP/premake" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$env:RUNNER_TEMP/premake/premake5.exe" --version


      - name: Generate makefiles
        run: premake5 gmake2

      - name: Build
        run: make config=release slimes -j2
