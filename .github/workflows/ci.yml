name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-linux:
    name: Build Linux amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsfml-dev libgl1-mesa-dev

      - name: Setup Premake Linux
        run: |
          curl -fsSL -o premake.tar.gz https://github.com/premake/premake-core/releases/download/v5.0.0-beta7/premake-5.0.0-beta7-linux.tar.gz
          tar -xzf premake.tar.gz
          sudo install -m 0755 premake5 /usr/local/bin/premake5

      - name: Build
        run: make build config=release jobs=2
